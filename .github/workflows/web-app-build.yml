name: Build and Deploy Next.js App to S3

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint (non-blocking)
        run: npm run lint || true

      - name: Build Next.js App
        run: npm run build

      - name: Set Environment Variables for AWS
        run: |
          # Determine the correct S3 bucket and CloudFront distribution ID based on the branch
          case "${{ github.ref_name }}" in
            "dev")
              echo "BUCKET_NAME=nessi-webapp-dev-${{ secrets.AWS_ACCOUNT_ID }}" >> $GITHUB_ENV
              echo "DISTRIBUTION_ID=${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_DEV }}" >> $GITHUB_ENV
              ;;
            "staging")
              echo "BUCKET_NAME=nessi-webapp-staging-${{ secrets.AWS_ACCOUNT_ID }}" >> $GITHUB_ENV
              echo "DISTRIBUTION_ID=${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_STAGING }}" >> $GITHUB_ENV
              ;;
            "main")
              echo "BUCKET_NAME=nessi-webapp-prod-${{ secrets.AWS_ACCOUNT_ID }}" >> $GITHUB_ENV
              echo "DISTRIBUTION_ID=${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }}" >> $GITHUB_ENV
              ;;
            *)
              echo "Branch not recognized. Exiting."
              exit 1
              ;;
          esac

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'us-east-2'
        run: |
          # Upload to the determined S3 bucket
          aws s3 sync ./out s3://$BUCKET_NAME --delete

      - name: Invalidate CloudFront Cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'us-east-2'
        run: |
          # Invalidate CloudFront cache for the determined distribution ID
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"
